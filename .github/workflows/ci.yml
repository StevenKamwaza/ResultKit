name: CI Build & Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore ResultKit.slnx

      - name: Build Solution
        run: dotnet build ResultKit.slnx --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test Tests/Tests.csproj --configuration Release --no-build --verbosity normal